name: Email Bot

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 9 * * *' # runs daily at 09:00 UTC (adjust or remove)

jobs:
  run-email-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; else echo "No requirements.txt found"; fi

      - name: Create .env from secret
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: |
          if [ -z "$BREVO_API_KEY" ]; then
            echo "Missing BREVO_API_KEY secret. Set it in repository settings -> Secrets."
            exit 1
          fi
          echo "BREVO_API_KEY=$BREVO_API_KEY" > .env
          chmod 600 .env
          echo ".env created"

      - name: Run email bot
        run: |
          python send_emails.py

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: email-bot-log
          path: email_bot.log
